<header class="site-header">
  <a class="brand" href="{{ `/` | relURL }}">{{ site.Title }}</a>
  <nav class="site-nav" aria-label="Primary">
    {{ range site.Menus.main }}
      <a href="{{ .URL }}">{{ .Name }}</a>
    {{ end }}
    <a href="{{ with site.Home.OutputFormats.Get `RSS` }}{{ .RelPermalink }}{{ end }}">RSS</a>
  </nav>
</header>
